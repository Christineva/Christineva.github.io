<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | SOAR Executive Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --beige: #F5F2ED; --dark-grey: #4A4E51; --stone-grey: #A8A8A8; --white: #FFFFFF; --gold: #C5A059; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--dark-grey); background: var(--white); line-height: 1.8; }
        
        h1, h2, h3, .serif, .client-name, .label { font-family: 'Playfair Display', serif; font-weight: 700 !important; }
        .label, .client-name { font-family: 'Inter', sans-serif; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 8%; position: fixed; width: 100%; top: 0; background: white; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--dark-grey); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; }

        .hero { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: var(--beige); padding: 160px 15% 80px; }
        .hero h1 { font-size: clamp(24px, 3vw, 32px); max-width: 900px; margin-bottom: 30px; line-height: 1.5; font-style: italic; }
        .hero p { max-width: 800px; font-weight: 300; font-size: 1.1rem; line-height: 2; color: var(--dark-grey); }

        .about-main { padding: 80px 8% 40px; max-width: 1400px; margin: 0 auto; }
        
        .vertical-row { display: flex; gap: 100px; margin-bottom: 100px; align-items: center; }

        .founder-box { flex: 0 0 500px; height: 500px; background: #f4f4f4; overflow: hidden; }
        .founder-box img { width: 100%; height: 100%; object-fit: cover; }

        .square-box { flex: 0 0 500px; height: auto; aspect-ratio: 1/1; background: #f4f4f4; overflow: hidden; }
        .square-box img { width: 100%; height: 100%; object-fit: cover; }

        .content-side { flex: 1; display: flex; flex-direction: column; justify-content: center; min-height: 450px; }
        .label { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--stone-grey); margin-top: 20px; display: block; text-align: center; }
        
        .main-title { font-size: 2.5rem; margin-bottom: 30px; }
        .section-title { text-align: center; margin: 40px 0 80px; }

        .testimonial-pair { display: grid; grid-template-columns: 1fr; gap: 60px; }
        .test-card { border-bottom: 1px solid #f0f0f0; padding-bottom: 40px; }
        .stars { color: var(--gold); font-size: 12px; margin-bottom: 15px; }
        .test-text { font-size: 1.1rem; font-weight: 300; line-height: 1.8; font-style: italic; }
        .test-text strong { display: block; margin-bottom: 10px; font-style: normal; font-weight: 700; }
        
        .client-info { display: flex; align-items: center; gap: 15px; margin-top: 20px; }
        .headshot { width: 50px; height: 50px; border-radius: 50%; background: #eee; overflow: hidden; }
        .headshot img { width: 100%; height: 100%; object-fit: cover; }
        .client-name { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; }

        .row-reverse { flex-direction: row-reverse; }

        .cta-container { padding: 40px 8% 80px; background: var(--white); }
        .footer-cta { 
            background: var(--beige); 
            color: var(--dark-grey); 
            padding: 100px 10%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            gap: 30px; 
            border: 1px solid var(--stone-grey); 
        }
        .footer-cta h2 { font-size: clamp(28px, 4vw, 42px); line-height: 1.2; max-width: 700px; }
        .footer-cta p { max-width: 800px; font-weight: 300; font-size: 1.15rem; }

        footer { padding: 40px 10%; text-align: center; font-size: 10px; letter-spacing: 3px; color: var(--stone-grey); text-transform: uppercase; font-weight: 700; }

        @media (max-width: 1100px) {
            .vertical-row, .row-reverse { flex-direction: column !important; text-align: center; gap: 50px; }
            .founder-box { width: 100%; max-width: 500px; height: auto; aspect-ratio: 1/1; flex: none; }
            .square-box { width: 100%; max-width: 500px; height: auto; aspect-ratio: 1/1; flex: none; }
            .content-side { min-height: auto; }
        }
    </style>
</head>
