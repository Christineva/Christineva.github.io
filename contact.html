<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | SOAR Executive Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --beige: #F5F2ED;
            --dark: #1A1A1A;
            --gold: #C5A47E;
            --white: #FFFFFF;
            --transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--dark); background: var(--white); line-height: 1.6; }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 25px 8%; position: fixed; width: 100%; top: 0;
            background: rgba(255, 255, 255, 0.98); z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 600; letter-spacing: 4px; text-transform: uppercase; font-size: 1.1rem; }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--dark); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; }

        /* Contact Content */
        .contact-hero { background-color: var(--beige); padding: 180px 10% 100px; text-align: center; }
        .contact-hero h1 { font-size: 3.5rem; font-weight: 200; letter-spacing: -1px; }

        .contact-details { padding: 100px 10%; text-align: center; max-width: 800px; margin: 0 auto; }
        .contact-method { margin-bottom: 60px; }
        .contact-method h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; color: var(--gold); margin-bottom: 15px; }
        .contact-link { font-size: 1.5rem; color: var(--dark); text-decoration: none; transition: 0.3s; font-weight: 300; }
        .contact-link:hover { color: var(--gold); }

        .social-icon { font-size: 2.5rem; color: var(--dark); transition: 0.3s; }
        .social-icon:hover { color: var(--gold); }

        /* Permanent Footer Section */
        .footer-cta { padding: 100px 10%; text-align: center; background: var(--beige); border-top: 1px solid #eee; }
        .footer-cta h2 { font-size: 2rem; font-weight: 200; margin-bottom: 20px; }
        
        footer { padding: 60px 10%; text-align: center; font-size: 10px; letter-spacing: 2px; color: #999; background: var(--white); }

        .reveal { opacity: 0; transform: translateY(30px); transition: var(--transition); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        @media (max-width: 768px) { .nav-links { display: none; } }
    </style>
</head>
<body>

    <nav>
        <div class="logo">SOAR</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="process.html">Process</a></li>
            <li><a href="testimonials.html">Testimonials</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="contact-hero">
        <h1 class="reveal">Connect with SOAR</h1>
    </div>

    <section class="contact-details">
        <div class="contact-method reveal">
            <h2>Direct Email</h2>
            <a href="mailto:contact@evachristine.com" class="contact-link">contact@evachristine.com</a>
        </div>

        <div class="contact-method reveal">
            <h2>LinkedIn</h2>
            <a href="https://www.linkedin.com/company/112514262/" target="_blank" class="social-icon">
                <i class="fa-brands fa-linkedin"></i>
            </a>
        </div>
    </section>

    <section class="footer-cta">
        <h2 class="reveal">Ready to reclaim your time?</h2>
        <p class="reveal" style="margin-bottom: 30px; font-weight: 300;">Accepting new partnerships for 2026.</p>
    </section>

    <footer>
        &copy; 2026 SOAR AGENCY | KES & INTERNATIONAL
    </footer>

    <script>
        const reveal = () => {
            document.querySelectorAll('.reveal').forEach(el => {
                if (el.getBoundingClientRect().top < window.innerHeight - 100) el.classList.add('active');
            });
        };
        window.addEventListener('scroll', reveal);
        reveal();
    </script>
</body>
</html>
