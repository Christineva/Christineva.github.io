<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOAR | Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .contact-container {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            padding: 0 20px;
        }
        .contact-method {
            margin-bottom: 40px;
        }
        .contact-method h2 {
            font-weight: 200;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.9rem;
            color: var(--gold);
            margin-bottom: 10px;
        }
        .contact-link {
            font-size: 1.4rem;
            color: var(--dark);
            text-decoration: none;
            transition: opacity 0.3s;
        }
        .contact-link:hover { opacity: 0.6; }
        .social-icon {
            font-size: 2rem;
            color: var(--dark);
            margin-top: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">SOAR</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="process.html">Process</a></li>
            <li><a href="testimonials.html">Testimonials</a></li>
        </ul>
        <button class="nav-cta open-modal">Inquire</button>
    </nav>

    <div class="contact-container reveal">
        <h1 style="font-weight: 200; font-size: 3rem; margin-bottom: 50px;">Get in Touch</h1>
        
        <div class="contact-method">
            <h2>Email</h2>
            <a href="mailto:contact@evachristine.com" class="contact-link">contact@evachristine.com</a>
        </div>

        <div class="contact-method">
            <h2>LinkedIn</h2>
            <a href="https://www.linkedin.com/company/112514262/" target="_blank" class="social-icon">
                <i class="fa-brands fa-linkedin"></i>
            </a>
        </div>

        <div class="contact-method" style="margin-top: 60px; border-top: 1px solid #eee; padding-top: 40px;">
            <p style="font-size: 0.8rem; letter-spacing: 1px; color: #888;">READY TO ELEVATE?</p>
            <p>Book your 1-week discovery trial.</p>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
