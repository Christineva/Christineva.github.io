<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | SOAR Executive Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --beige: #F5F2ED;
            --charcoal: #333638; /* Refined Grey */
            --dark-grey: #4A4E51;
            --stone-grey: #A8A8A8;
            --white: #FFFFFF;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--dark-grey); background: var(--white); line-height: 1.6; }
        h1, h2 { font-family: 'Playfair Display', serif; font-weight: 400; }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 25px 8%; position: sticky; top: 0;
            background: rgba(255, 255, 255, 0.98); z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 600; letter-spacing: 4px; text-transform: uppercase; font-size: 1.1rem; color: var(--charcoal); }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--dark-grey); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; }
        
        .nav-cta { 
            background: var(--charcoal); color: white; border: none; 
            padding: 12px 28px; font-size: 10px; letter-spacing: 2px; 
            text-transform: uppercase; cursor: pointer;
        }

        /* Contact Hero */
        .contact-hero {
            background-color: var(--beige);
            padding: 120px 10% 80px;
            text-align: center;
        }
        .contact-hero h1 { font-size: clamp(35px, 6vw, 60px); margin-bottom: 20px; color: var(--charcoal); }

        /* Contact Content */
        .contact-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 100px;
            padding: 100px 10%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .contact-info h2 { font-size: 2.2rem; margin-bottom: 30px; line-height: 1.2; color: var(--charcoal); }
        .contact-info p { margin-bottom: 20px; font-weight: 300; font-size: 1.1rem; }
        .email-link { 
            display: block; 
            font-size: 1.3rem; 
            color: var(--charcoal); 
            text-decoration: none; 
            margin-top: 40px;
            border-bottom: 1px solid var(--stone-grey);
            width: fit-content;
            transition: 0.3s;
        }
        .email-link:hover { color: var(--stone-grey); border-bottom-color: var(--charcoal); }

        /* Professional Form */
        .contact-form { display: flex; flex-direction: column; gap: 25px; }
        .contact-form input, .contact-form textarea {

            border: none;
