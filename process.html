<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOAR | Executive Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --beige: #F5F2ED; --dark-grey: #4A4E51; --stone-grey: #A8A8A8; --white: #FFFFFF; --transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; color: var(--dark-grey); background: var(--white); line-height: 1.8; overflow-x: hidden; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; font-weight: 400; }

        /* HEADER */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 8%; position: fixed; width: 100%; top: 0; background: rgba(255, 255, 255, 0.98); z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .logo a { text-decoration: none; color: var(--dark-grey); font-weight: 600; letter-spacing: 4px; text-transform: uppercase; font-size: 1.1rem; display: flex; align-items: center; }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--dark-grey); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; }
        .nav-cta { background: var(--dark-grey); color: white; border: none; padding: 12px 28px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }

        /* HERO - Bloom Style */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: var(--beige); padding: 0 10%; }
        .hero h1 { font-size: clamp(50px, 10vw, 120px); line-height: 1; margin-bottom: 20px; }
        .hero p { letter-spacing: 4px; text-transform: uppercase; font-size: 12px; color: var(--stone-grey); }

        /* MANTRA SECTION */
        section { padding: 180px 10%; text-align: center; }
        .mantra h2 { font-size: clamp(30px, 5vw, 60px); max-width: 900px; margin: 0 auto; line-height: 1.2; }

        /* IMAGE GRID SECTION */
        .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; padding: 0 8% 180px; }
        .grid-item { height: 600px; background: var(--beige); overflow: hidden; position: relative; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .grid-label { position: absolute; bottom: 30px; left: 30px; color: white; text-transform: uppercase; letter-spacing: 2px; font-size: 10px; }

        /* CALL TO ACTION SECTION */
        .cta-box { background: var(--dark-grey); color: white; padding: 120px 10%; text-align: center; }
        .cta-box h2 { font-size: 3rem; margin-bottom: 40px; }

        footer { padding: 80px 10%; text-align: center; font-size: 10px; letter-spacing: 2px; color: var(--stone-grey); }
        .reveal { opacity: 0; transform: translateY(50px); transition: var(--transition); }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <a href="index.html">
                <img src="logo.png" alt="SOAR" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" style="height: 35px; width: auto;">
                <span style="display: none;">SOAR</span>
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="process.html">Process</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <button class="nav-cta" onclick="location.href='contact.html'">Inquire</button>
    </nav>

    <section class="hero">
        <h1 class="reveal">Delegate.<br>Grow.<br><i class="serif">Bloom.</i></h1>
        <p class="reveal">Executive Operations for the Visionary Leader</p>
    </section>

    <section class="mantra reveal">
        <h2>We protect your time so you can lead from your <i class="serif">zone of genius.</i></h2>
    </section>

    <div class="home-grid">
        <div class="grid-item reveal" onclick="location.href='services.html'" style="cursor: pointer;">
            <img src="home-1.jpg" alt="Services">
            <div class="grid-label">View Services —</div>
        </div>
        <div class="grid-item reveal" onclick="location.href='about.html'" style="cursor: pointer;">
            <img src="home-2.jpg" alt="About">
            <div class="grid-label">The Story —</div>
        </div>
    </div>
