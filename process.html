<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process | SOAR Executive Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --beige: #F5F2ED;
            --charcoal: #333638;
            --dark-grey: #4A4E51;
            --stone-grey: #A8A8A8;
            --light-grey: #F0F0F0; /* New Beautiful Light Grey Background */
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; color: var(--dark-grey); background: var(--light-grey); line-height: 1.8; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; font-weight: 400; }

        /* NAVIGATION */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 25px 8%; position: fixed; width: 100%; top: 0; 
            background: rgba(255, 255, 255, 0.98); z-index: 1000; 
            border-bottom: 1px solid rgba(0,0,0,0.05); 
        }
        .logo a { text-decoration: none; color: var(--charcoal); font-weight: 600; letter-spacing: 4px; text-transform: uppercase; font-size: 1.1rem; }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--dark-grey); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; }
        .nav-cta { background: var(--charcoal); color: white; border: none; padding: 12px 28px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .nav-cta:hover { opacity: 0.8; }

        /* PROCESS LAYOUT */
        .process-container {
            padding: 150px 10% 100px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .process-header { text-align: center; margin-bottom: 80px; }
        .process-header h1 { font-size: clamp(40px, 8vw, 70px); color: var(--charcoal); margin-bottom: 20px; }
        .process-header p { text-transform: uppercase; letter-spacing: 3px; font-size: 12px; color: var(--stone-grey); }

        /* BEIGE CARDS */
        .step-card {
            background: var(--beige);
            margin-bottom: 40px;
            padding: 80px 10%;
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 40px;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border-radius: 2px; /* Subtle high-end sharp edges */
        }

        .step-number { 
            font-size: 12px; 
            letter-spacing: 5px; 
            text-transform: uppercase; 
            color: var(--stone-grey); 
            transform: rotate(-90deg);
            white-space: nowrap;
        }

        .step-content h2 { font-size: clamp(30px, 4vw, 45px); line-height: 1.2; margin-bottom: 25px; color: var(--charcoal); }
        .step-content p { font-size: 1.1rem; font-weight: 300; max-width: 700px; color: var(--dark-grey); }
        .serif-text { font-style: italic; }

        /* FINAL CTA SECTION */
        .final-cta {
            text-align: center;
            padding: 100px 0;
        }

        /* FOOTER */
        footer { padding: 80px 10%; text-align: center; background: var(--white); border-top: 1px solid #eee; }
        .footer-logo { font-weight: 600; letter-spacing: 5px; margin-bottom: 20px; font-size: 1.2rem; }
        .footer-tag { font-size: 10px; letter-spacing: 3px; color: var(--stone-grey); text-transform: uppercase; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .step-card { grid-template-columns: 1fr; text-align: center; padding: 60px 8%; }
            .step-number { transform: none; margin-bottom: 20px; }
            .step-content p { margin: 0 auto; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><a href="index.html">SOAR</a></div>
        <ul class="nav-links">
