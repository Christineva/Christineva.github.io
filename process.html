<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process | SOAR Executive Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --beige: #F5F2ED;
            --charcoal: #333638;
            --dark-grey: #4A4E51;
            --stone-grey: #A8A8A8;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; color: var(--dark-grey); background: var(--white); line-height: 1.8; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; font-weight: 400; }

        /* NAVIGATION */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 25px 8%; position: fixed; width: 100%; top: 0; 
            background: rgba(255, 255, 255, 0.98); z-index: 1000; 
            border-bottom: 1px solid rgba(0,0,0,0.05); 
        }
        .logo a { text-decoration: none; color: var(--charcoal); font-weight: 600; letter-spacing: 4px; text-transform: uppercase; font-size: 1.1rem; }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--dark-grey); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; }
        .nav-cta { background: var(--charcoal); color: white; border: none; padding: 12px 28px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }

        /* FULL HEIGHT SCROLL SECTIONS */
        .process-step {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 15%;
            position: relative;
        }

        /* GREY THEME (Steps 1 & 3) */
        .bg-grey { background-color: var(--charcoal); color: var(--white); }
        .bg-grey .step-number { color: var(--stone-grey); }
        .bg-grey .serif-text { color: var(--white); }
        .bg-grey p { color: #D1D1D1; }

        /* BEIGE THEME (Step 2) */
        .bg-beige { background-color: var(--beige); color: var(--charcoal); }
        .bg-beige .step-number { color: var(--stone-grey); }

        /* TYPOGRAPHY */
        .step-number { font-size: 12px; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 20px; display: block; }
        .process-step h2 { font-size: clamp(35px, 6vw, 70px); line-height: 1.2; margin-bottom: 30px; }
        .process-step p { max-width: 700px; font-size: 1.1rem; font-weight: 300; margin-bottom: 40px; }
        .serif-text { font-style: italic; }

        /* FOOTER */
        footer { padding: 80px 10%; text-align: center; background: var(--white); border-top: 1px solid #eee; }
        .footer-logo { font-weight: 600; letter-spacing: 5px; margin-bottom: 20px; font-size: 1.2rem; }
        .footer-tag { font-size: 10px; letter-spacing: 3px; color: var(--stone-grey); text-transform: uppercase; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .process-step { padding: 0 8%; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><a href="index.html">SOAR</a></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="process.html">Process</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <button class="nav-cta" onclick="location.href='contact.html'">Inquire</button>
    </nav>

    <section class="process-step bg-grey">
        <span class="step-number">Step 01</span>
        <h2>Strategic Alignment <br><i class="serif-text">Session</i></h2>
