<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOAR | Executive Operations Agency</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --beige: #F5F2ED;
            --dark-grey: #4A4E51;
            --stone-grey: #A8A8A8;
            --white: #FFFFFF;
            --transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; color: var(--dark-grey); background: var(--white); line-height: 1.8; overflow-x: hidden; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; font-weight: 400; }

        /* NAVIGATION */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 25px 8%; position: fixed; width: 100%; top: 0;
            background: rgba(255, 255, 255, 0.98); z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 600; letter-spacing: 4px; text-transform: uppercase; font-size: 1.1rem; }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--dark-grey); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; }
        
        .nav-cta { 
            background: var(--dark-grey); color: white; border: none; 
            padding: 12px 28px; font-size: 10px; letter-spacing: 2px; 
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }

        /* HERO SECTION */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background-color: var(--beige); padding: 0 10%;
        }
        .hero h1 { font-size: clamp(45px, 8vw, 90px); margin-bottom: 25px; line-height: 1.1; }
        .hero .tagline { font-size: clamp(24px, 4vw, 40px); color: var(--dark-grey); margin-bottom: 30px; font-style: italic; }
        .hero p { max-width: 600px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--stone-grey); margin-bottom: 40px; }

        /* GREY SERVICES STRIP */
        .services-strip { background: var(--dark-grey); color: var(--white); padding: 140px 10%; }
        .services-strip h2 { font-size: 3rem; margin-bottom: 60px; }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 60px; }
        .service-item h3 { font-size: 1.4rem; margin-bottom: 20px; color: var(--white); }
        .service-item p { font-size: 0.95rem; font-weight: 200; color: #D1D1D1; line-height: 1.8; }

        /* STAGGERED CONTENT SECTIONS */
        .content-block { padding: 160px 10%; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
        .content-block.reverse { direction: rtl; }
        .content-block.reverse div { direction: ltr; }
        .image-box { width: 100%; height: 600px; background: var(--beige); overflow: hidden; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .text-box h2 { font-size: 3.5rem; margin-bottom: 30px; }
        .text-box p { font-size: 1.1rem; color: var(--dark-grey); margin-bottom: 30px; font-weight: 300; }

        /* FOOTER & CTA */
        .footer-cta { padding: 140px 10%; text-align: center; background: var(--beige); }
        .footer-cta h2 { font-size: 3rem; margin-bottom: 40px; }
        
        footer { padding: 80px 10%; background: var(--white); display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; }
        .footer-col h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; color: var(--stone-grey); margin-bottom: 25px; }
        .footer-col p, .footer-col a { font-size: 12px; color: var(--dark-grey); text-decoration: none; display: block; margin-bottom: 10px; }

        /* ANIMATIONS */
        .reveal { opacity: 0; transform: translateY(40px); transition: var(--transition); }
        .reveal.active { opacity: 1; transform: translateY(0); }
