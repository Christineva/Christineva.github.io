<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | SOAR Executive Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --beige: #F5F2ED; --dark-grey: #4A4E51; --stone-grey: #A8A8A8; --white: #FFFFFF; --transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; color: var(--dark-grey); background: var(--white); line-height: 1.8; }
        h1, h2 { font-family: 'Playfair Display', serif; font-weight: 400; }

        /* HEADER */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 8%; position: fixed; width: 100%; top: 0; background: rgba(255, 255, 255, 0.98); z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .logo a { text-decoration: none; color: var(--dark-grey); font-weight: 600; letter-spacing: 4px; text-transform: uppercase; font-size: 1.1rem; display: flex; align-items: center; }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--dark-grey); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; }
        .nav-cta { background: var(--dark-grey); color: white; border: none; padding: 12px 28px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }

        /* CONTACT FORM SECTION */
        .contact-hero { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--beige); text-align: center; padding-top: 80px; }
        .contact-hero h1 { font-size: clamp(40px, 8vw, 80px); line-height: 1.1; }

        .form-container { padding: 100px 10%; max-width: 800px; margin: 0 auto; }
        .contact-form { display: grid; gap: 30px; }
        .form-group { display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--stone-grey); }
        input, textarea { padding: 15px; border: none; border-bottom: 1px solid #ddd; font-family: 'Inter', sans-serif; outline: none; transition: 0.3s; font-weight: 200; }
        input:focus, textarea:focus { border-bottom: 1px solid var(--dark-grey); }
        
        .submit-btn { background: var(--dark-grey); color: white; border: none; padding: 20px; text-transform: uppercase; letter-spacing: 3px; font-size: 10px; cursor: pointer; margin-top: 20px; transition: var(--transition); }
        .submit-btn:hover { opacity: 0.8; }

        footer { padding: 80px 10%; text-align: center; font-size: 10px; letter-spacing: 2px; color: var(--stone-grey); border-top: 1px solid #eee; }
        .reveal { opacity: 0; transform: translateY(50px); transition: var(--transition); }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <nav>
        <div class="logo">
            <a href="index.html">
                <img src="logo.png" alt="SOAR" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" style="height: 35px; width: auto;">
                <span style="display: none;">SOAR</span>
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="process.html">Process</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <button class="nav-cta" onclick="location.href='contact.html'">Inquire</button>
    </nav>

    <section class="contact-hero">
        <h1 class="reveal">Let's <br><i class="serif">Connect.</i></h1>
        <p class="reveal" style="letter-spacing: 2px; text-transform: uppercase; font-size: 10px; margin-top: 20px;">For the founders ready for more space.</p>
    </section>

    <div class="form-container reveal">
        <form class="contact-form">
            <div class="form-group">
                <label>Name</label>
                <input type="text" placeholder="Your full name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="email@address.com">
            </div>
            <div class="form-group">
                <label>How can we help?</label>
                <textarea rows="5" placeholder="Tell us about your business goals..."></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Inquiry —></button>
        </form>
    </div>

    <footer>&copy; 2026 SOAR AGENCY | KES & INTERNATIONAL</footer>

    <script>
        const reveal = () => { document.querySelectorAll('.reveal').forEach(el => { if (el.getBoundingClientRect().top < window.innerHeight - 100) el.classList.add('active'); }); };
        window.addEventListener('scroll', reveal); reveal();
    </script>
</body>
</html>
