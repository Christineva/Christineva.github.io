<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOAR | Executive Virtual Assistance</title>
    <style>
        /* This is the "Bloom" style: Minimalist & Elegant */
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            line-height: 1.6;
            background-color: #fff;
        }
        header {
            padding: 40px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .hero {
            padding: 100px 10%;
            text-align: center;
        }
        .hero h1 {
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 20px;
        }
        .hero p {
            font-size: 20px;
            color: #666;
            max-width: 600px;
            margin: 0 auto 30px;
        }
        .cta-button {
            background-color: #000;
            color: #fff;
            padding: 15px 30px;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .section {
            padding: 80px 10%;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">SOAR</div>
    </header>

    <div class="hero">
        <h1>Elevate Your Operations.</h1>
        <p>High-level executive support for visionary leaders. We handle the details so you can focus on the big picture.</p>
        <a href="mailto:your-email@example.com" class="cta-button">Apply to Work With Us</a>
    </div>

    <div class="section">
        <h2 style="text-align: center; font-weight: 300;">Elite Services</h2>
        <ul style="list-style: none; padding: 0; text-align: center;">
            <li>Strategic Calendar Management</li>
            <li>Inbound Operations & Systems</li>
            <li>Executive Travel & Lifestyle</li>
        </ul>
    </div>

</body>
</html>
