<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOAR | Executive Operations Agency</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --beige: #F5F2ED;
            --cream: #FDFBF7;
            --dark-grey: #4A4E51;
            --stone-grey: #A8A8A8;
            --white: #FFFFFF;
            --transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; color: var(--dark-grey); background: var(--white); line-height: 1.6; }
        h1, h2, .serif { font-family: 'Playfair Display', serif; }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 25px 8%; position: fixed; width: 100%; top: 0;
            background: rgba(255, 255, 255, 0.98); z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 600; letter-spacing: 4px; text-transform: uppercase; font-size: 1.1rem; }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--dark-grey); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; }
        .nav-links a:hover { color: var(--stone-grey); }
        
        .nav-cta { 
            background: var(--dark-grey); color: white; border: none; 
            padding: 12px 28px; font-size: 10px; letter-spacing: 2px; 
            text-transform: uppercase; cursor: pointer; transition: var(--transition);
        }
        .nav-cta:hover { background: var(--stone-grey); }

        /* Hero Section */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background-color: var(--beige); padding: 0 10%;
        }
        .hero h1 { font-size: clamp(40px, 6vw, 80px); margin-bottom: 20px; line-height: 1.1; font-weight: 400; }
        .hero p { max-width: 650px; font-size: 1.2rem; color: var(--dark-grey); margin-bottom: 40px; font-weight: 300; }

        /* Services Preview Section */
        .services-preview { background: var(--dark-grey); color: var(--white); padding: 100px 10%; }
        .services-preview h2 { font-size: 2.5rem; margin-bottom: 50px; font-weight: 300; }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; }
        .service-item h3 { color: var(--stone-grey); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 15px; }
        .service-item p { font-size: 0.95rem; opacity: 0.8; font-weight: 200; }

        /* About Preview Section */
        .about-preview { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; padding: 120px 10%; align-items: center; background: var(--cream); }
        .about-image { background: var(--beige); height: 500px; overflow: hidden; }
        .about-image img { width: 100%; height: 100%; object-fit: cover; }
        .about-text h2 { font-size: 2.5rem; margin-bottom: 25px; font-weight: 300; }
        .about-text p { font-size: 1.1rem; color: #444; margin-bottom: 30px; font-weight: 300; }

        /* Permanent Footer Contact Section */
        .footer-cta { padding: 120px 10%; text-align: center; background: var(--beige); border-top: 1px solid #eee; }
        .footer-cta h2 { font-size: 2.5rem; font-weight: 200; margin-bottom: 30px; color: var(--dark-grey); }
